<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Podcastgids</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --bg:#12100d; --kaart:#1c1915; --rand:#2c2822; --tekst:#ece5d8; --dim:#a89f8d; --accent:#e8b04b; }
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tekst);font-family:Inter,-apple-system,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
header{padding:46px 20px 20px;text-align:center;background:radial-gradient(ellipse 90% 120% at 50% -20%,#3a2c14 0%,transparent 60%),var(--bg)}
.boventitel{color:var(--accent);font-size:13px;letter-spacing:.25em;text-transform:uppercase;font-weight:600}
h1{font-family:Fraunces,Georgia,serif;font-weight:700;font-size:clamp(30px,7vw,46px);margin:8px 0 6px}
header p{color:var(--dim);font-size:15px;max-width:520px;margin:0 auto}
main{max-width:680px;margin:0 auto;padding:14px 18px 60px}
a.kaart{display:block;text-decoration:none;background:var(--kaart);border:1px solid var(--rand);border-radius:14px;padding:16px 18px;margin:12px 0;color:var(--tekst)}
a.kaart:hover{border-color:var(--accent)}
a.kaart .pod{color:var(--accent);font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600}
a.kaart h2{font-family:Fraunces,Georgia,serif;font-weight:600;font-size:20px;margin:4px 0 2px}
a.kaart .datum{color:var(--dim);font-size:13.5px}
</style>
</head>
<body>
<header>
  <div class="boventitel">Podcastgids</div>
  <h1>Muziek uit mijn podcasts</h1>
  <p>Per aflevering de besproken artiesten en nummers, als verdieping bij de bijbehorende Spotify-playlist.</p>
</header>
<main>
  <a class="kaart" href="altlatino/2026-07-01.html">
    <div class="pod">Alt.Latino · NPR Music</div>
    <h2>Mon Laferte's captivating coda</h2>
    <div class="datum">1 juli 2026 · 9 nummers, 6 artiesten</div>
  </a>
</main>
</body>
</html>
